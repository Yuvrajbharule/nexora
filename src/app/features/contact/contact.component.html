<app-navbar></app-navbar>

<section class="h-screen flex items-center justify-center bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 px-4">

  <div class="max-w-5xl w-full grid md:grid-cols-2 bg-white rounded-2xl shadow-2xl overflow-hidden">

    <!-- LEFT SIDE -->
    <div class="bg-blue-600 text-white p-6 flex flex-col justify-center">

      <h2 class="text-2xl font-bold">Let's Talk 🚀</h2>

      <p class="mt-2 text-sm text-gray-200">
        Need a website or SecureDeck demo? Let’s connect and grow your business.
      </p>

      <div class="mt-4 space-y-2 text-sm">
        <p>📞 +91 9876543210</p>
        <p>📧 hello@nexoratech.com</p>
        <p>📍 Nashik, Maharashtra</p>
      </div>

      <p class="mt-6 text-xs text-gray-300">
        We usually respond within 24 hours
      </p>

    </div>

    <!-- RIGHT SIDE -->
    <div class="p-6">

      <h3 class="text-xl font-bold text-gray-800 text-center">
        Send Message
      </h3>

      <form class="mt-4 space-y-3">

        <!-- Name -->
        <input type="text"
               placeholder="Full Name"
               class="w-full border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">

        <!-- Email -->
        <input type="email"
               placeholder="Email"
               class="w-full border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">

        <!-- Mobile -->
        <input type="text"
               placeholder="Mobile Number"
               class="w-full border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">

        <!-- Service -->
        <select class="w-full border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
          <option>Website Development</option>
          <option>SecureDeck SaaS</option>
          <option>SEO / Optimization</option>
        </select>

        <!-- Message -->
        <textarea rows="3"
                  placeholder="Your Requirement"
                  class="w-full border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>

        <!-- Button -->
        <button type="submit"
                class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:scale-105 transition">
          Send Message
        </button>

      </form>

      <!-- WhatsApp CTA -->
      <p class="text-center text-xs text-gray-500 mt-4">
        Or connect instantly via WhatsApp 💬
      </p>

    </div>

  </div>

</section>
